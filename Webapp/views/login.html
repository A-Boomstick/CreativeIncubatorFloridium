<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>FLORIDIUM</h1>
    </header>
    <main>
        <div id="login-container">

            <form action="/login" method="POST" autocomplete="off">
                <h2>Login</h2>

                <input type="text" style="display:none" />
                <input type="password" style="display:none" />

                <label for="login-user-field">Username</label>
                <input type="text" id="login-user-field" name="username" autocomplete="off" spellcheck="false"
                    required />

                <label for="login-pass-field">Password</label>
                <input type="password" id="login-pass-field" name="password" autocomplete="new-password" required />

                <button type="submit">Submit</button>
            </form>

        </div>

    </main>
    <footer>

    </footer>
</body>

</html>
